<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Simulator</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { margin-top: 0; color: #2c3e50; }
        
        .hidden { display: none !important; }

        /* Setup Section */
        #setup-section {
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
        }

        input[type="file"] {
            margin-top: 15px;
            font-size: 16px;
        }

        .setting-row {
            margin-top: 20px;
            font-size: 1.1em;
            color: #555;
        }

        /* Quiz Section */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #6c757d;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-badge {
            background-color: #e9ecef;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .score-badge .correct-text { color: var(--success-color); }
        .score-badge .incorrect-text { color: var(--error-color); }

        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-label:hover:not(.disabled) {
            background-color: #f8f9fa;
        }

        .option-label input {
            margin-top: 4px;
            margin-right: 15px;
        }

        .option-text { flex: 1; }

        /* Status Colors */
        .option-label.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
        }

        .option-label.incorrect {
            background-color: #f8d7da;
            border-color: var(--error-color);
            color: #721c24;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: #0056b3; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; }

        /* Feedback Section */
        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            background-color: #e9ecef;
            border-left: 5px solid var(--primary-color);
        }

        .feedback-status {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-status.success { color: var(--success-color); }
        .feedback-status.error { color: var(--error-color); }
        
        .explanation-text {
            font-size: 0.95em;
            white-space: pre-wrap;
        }

        .action-container {
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AWS Exam Simulator</h2>

    <div id="setup-section">
        <p>กรุณาอัปโหลดไฟล์ <strong>questions.json</strong> ของคุณหรือใช้ไฟล์ตัวอย่างด้านล่างเพื่อเริ่มทำข้อสอบ</p>
        <button id="load-prebuilt-btn" class="btn" style="margin-bottom: 15px;">AWS Certified Solutions Architect - Associate</button>
        <br>
        <input type="file" id="jsonFileInput" accept=".json">
        
        <div class="setting-row">
            <label style="cursor: pointer;">
                <input type="checkbox" id="randomizeCheckbox" checked> 
                สุ่มลำดับข้อสอบ (Randomize Questions)
            </label>
        </div>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="header-info">
            <span id="domain-info">Domain: -</span>
            <span id="progress-info">ข้อ 1 / 100</span>
            <span class="score-badge">
                <span class="correct-text">ถูก: <span id="score-correct">0</span></span> | 
                <span class="incorrect-text">ผิด: <span id="score-incorrect">0</span></span>
            </span>
        </div>

        <div class="question-text" id="question-text">คำถามจะแสดงที่นี่</div>
        
        <div class="options-container" id="options-container">
            </div>

        <div>
            <button id="submit-btn" class="btn">ตรวจคำตอบ</button>
        </div>

        <div id="feedback-section" class="feedback-box hidden">
            <div id="feedback-status" class="feedback-status"></div>
            <div class="explanation-text" id="explanation-text"></div>
            <div class="action-container">
                <button id="next-btn" class="btn">ข้อถัดไป ➔</button>
            </div>
        </div>
    </div>

    <div id="result-section" class="hidden" style="text-align: center;">
        <h2>สิ้นสุดการทดสอบ!</h2>
        <p>คุณทำคะแนนได้ <strong id="final-score" style="font-size: 1.5em; color: var(--success-color);">0</strong> คะแนน</p>
        <p>ตอบผิดทั้งหมด <strong id="final-incorrect" style="font-size: 1.2em; color: var(--error-color);">0</strong> ข้อ</p>
        <button onclick="location.reload()" class="btn" style="margin-top: 20px;">ทำข้อสอบใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    let questionsData = [];
    let currentIndex = 0;
    let score = 0;
    let incorrectScore = 0;

    const setupSection = document.getElementById('setup-section');
    const quizSection = document.getElementById('quiz-section');
    const resultSection = document.getElementById('result-section');
    const fileInput = document.getElementById('jsonFileInput');
    const randomizeCheckbox = document.getElementById('randomizeCheckbox');
    
    const domainInfo = document.getElementById('domain-info');
    const progressInfo = document.getElementById('progress-info');
    const scoreCorrectEl = document.getElementById('score-correct');
    const scoreIncorrectEl = document.getElementById('score-incorrect');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const submitBtn = document.getElementById('submit-btn');
    const feedbackSection = document.getElementById('feedback-section');
    const feedbackStatus = document.getElementById('feedback-status');
    const explanationText = document.getElementById('explanation-text');
    const nextBtn = document.getElementById('next-btn');
    const loadPrebuiltBtn = document.getElementById('load-prebuilt-btn');

    // ฟังก์ชันสำหรับสับเปลี่ยนลำดับ Array (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startQuizFromData(data) {
        questionsData = Array.isArray(data) ? data.slice() : [];
        if (questionsData.length === 0) {
            alert("ไม่พบข้อมูลคำถามในไฟล์ JSON");
            return;
        }

        currentIndex = 0;
        score = 0;
        incorrectScore = 0;
        scoreCorrectEl.textContent = score;
        scoreIncorrectEl.textContent = incorrectScore;

        if (randomizeCheckbox.checked) {
            shuffleArray(questionsData);
        }

        setupSection.classList.add('hidden');
        quizSection.classList.remove('hidden');
        loadQuestion();
    }

    // โหลดไฟล์ JSON
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                startQuizFromData(data);
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการอ่านไฟล์ JSON: " + err.message);
            }
        };
        reader.readAsText(file);
    });

    loadPrebuiltBtn.addEventListener('click', function() {
        fetch('aws-saa-c03-full-exam.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('ไม่สามารถโหลดไฟล์ตัวอย่างได้: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => startQuizFromData(data))
            .catch(err => alert('เกิดข้อผิดพลาดในการโหลดไฟล์ตัวอย่าง: ' + err.message));
    });

    // โหลดข้อสอบขึ้นมาแสดง
    function loadQuestion() {
        const q = questionsData[currentIndex];
        
        // แสดง ID จริงของข้อสอบแนบไปกับลำดับที่ทำอยู่ เพื่อให้รู้ว่ากำลังทำข้อไหนอยู่จริงๆ ตอนสุ่ม
        domainInfo.textContent = `Question ID: ${q.id} | Domain: ${q.domain || 'N/A'}`;
        progressInfo.textContent = `ข้อ ${currentIndex + 1} / ${questionsData.length}`;
        questionText.textContent = q.question;
        
        optionsContainer.innerHTML = '';
        feedbackSection.classList.add('hidden');
        submitBtn.classList.remove('hidden');
        submitBtn.disabled = false;

        // สร้างตัวเลือก (Radio สำหรับ single, Checkbox สำหรับ multiple)
        const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';

        q.options.forEach(opt => {
            const label = document.createElement('label');
            label.className = 'option-label';
            label.id = `label-${opt.id}`;

            const input = document.createElement('input');
            input.type = inputType;
            input.name = 'option';
            input.value = opt.id;
            
            const span = document.createElement('span');
            span.className = 'option-text';
            span.innerHTML = `<strong>${opt.id}.</strong> ${opt.text}`;

            label.appendChild(input);
            label.appendChild(span);
            optionsContainer.appendChild(label);
        });
    }

    // ตรวจคำตอบ
    submitBtn.addEventListener('click', function() {
        const q = questionsData[currentIndex];
        const selectedInputs = Array.from(document.querySelectorAll('input[name="option"]:checked'));
        
        if (selectedInputs.length === 0) {
            alert("กรุณาเลือกคำตอบอย่างน้อย 1 ข้อ");
            return;
        }

        const selectedValues = selectedInputs.map(input => input.value);
        const correctAnswers = q.correctAnswers;

        // ปิดไม่ให้แก้ไขคำตอบ
        const allInputs = document.querySelectorAll('input[name="option"]');
        allInputs.forEach(input => {
            input.disabled = true;
            input.parentElement.classList.add('disabled');
        });

        // ตรวจสอบความถูกต้อง
        let isCorrect = false;
        if (q.type === 'single') {
            isCorrect = selectedValues[0] === correctAnswers[0];
        } else {
            // สำหรับ multiple choice ต้องตอบถูกทุกข้อและจำนวนข้อต้องเท่ากัน
            isCorrect = selectedValues.length === correctAnswers.length && 
                        selectedValues.every(val => correctAnswers.includes(val));
        }

        // อัปเดตคะแนน
        if (isCorrect) {
            score++;
            scoreCorrectEl.textContent = score;
        } else {
            incorrectScore++;
            scoreIncorrectEl.textContent = incorrectScore;
        }

        // ไฮไลท์สีตัวเลือก
        q.options.forEach(opt => {
            const label = document.getElementById(`label-${opt.id}`);
            if (correctAnswers.includes(opt.id)) {
                label.classList.add('correct'); // ข้อที่ถูกต้องเฉลยเป็นสีเขียว
            } else if (selectedValues.includes(opt.id)) {
                label.classList.add('incorrect'); // ข้อที่ตอบผิดเป็นสีแดง
            }
        });

        // แสดง Feedback
        submitBtn.classList.add('hidden');
        feedbackSection.classList.remove('hidden');

        if (isCorrect) {
            feedbackStatus.textContent = "✅ ถูกต้อง!";
            feedbackStatus.className = "feedback-status success";
        } else {
            feedbackStatus.textContent = `❌ ผิด! คำตอบที่ถูกต้องคือ: ${correctAnswers.join(', ')}`;
            feedbackStatus.className = "feedback-status error";
        }

        explanationText.innerHTML = `<strong>คำอธิบาย:</strong><br>${q.explanation || 'ไม่มีคำอธิบายเพิ่มเติม'}`;
        
        if (currentIndex === questionsData.length - 1) {
            nextBtn.textContent = "ดูผลคะแนน";
        }
    });

    // เปลี่ยนข้อ
    nextBtn.addEventListener('click', function() {
        currentIndex++;
        if (currentIndex < questionsData.length) {
            loadQuestion();
        } else {
            quizSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score} / ${questionsData.length}`;
            document.getElementById('final-incorrect').textContent = `${incorrectScore}`;
        }
    });
</script>

</body>
</html>
